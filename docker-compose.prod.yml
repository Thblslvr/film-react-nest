version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: film-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - film-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/thblslvr/film-backend:local
    container_name: film-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_DRIVER: postgres
      DATABASE_URL: postgresql://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
      LOG_FORMAT: ${LOG_FORMAT:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - film-network

  frontend:
  build:
    context: .                    # корень проекта (где лежит папка nginx)
    dockerfile: ./frontend/Dockerfile
  image: ghcr.io/thblslvr/film-frontend:local
  container_name: film-frontend
  restart: unless-stopped
  ports:
    - "80:80"
  depends_on:
    - backend
  networks:
    - film-network
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: film-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - film-network

networks:
  film-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
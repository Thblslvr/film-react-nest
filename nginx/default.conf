server {
    listen 80;
    server_name zhlob.nomorepartiessite.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zhlob.nomorepartiessite.ru;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/json;
        sub_filter_once off;
        sub_filter '/content/afisha/' '/images/';
    }

    location /images/ {
        rewrite ^/images/(.*)$ /content/afisha/$1 break;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # Исправляем двойной префикс /content/afisha/content/afisha/
    location ~ ^/content/afisha/content/afisha/(.*)$ {
        rewrite ^/content/afisha/content/afisha/(.*)$ /content/afisha/$1 break;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # /content/afisha/images/... -> убираем images/
    location ~ ^/content/afisha/images/(.*)$ {
        rewrite ^/content/afisha/images/(.*)$ /content/afisha/$1 break;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # Обычный /content/ -> проксируем на бэкенд
    location /content/ {
        proxy_pass http://backend:3000/content/;
        proxy_set_header Host $host;
    }
}